name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check src tests scripts
      - name: Mypy (strict)
        run: uv run mypy --strict src

  coverage-audit:
    name: API coverage audit (213 operations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Every spec operation implemented (sync + async)
        run: uv run python scripts/check_coverage.py
      - name: Sync/async twins are identical
        run: uv run python scripts/check_parity.py

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen
      - name: Tests
        run: uv run pytest -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Build docs (strict)
        run: uv run mkdocs build --strict

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Single required status check for branch protection: green only when
  # every job above succeeded.
  ci-ok:
    if: always()
    needs: [lint, coverage-audit, test, docs, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check that all jobs succeeded
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "$results"
          if echo "$results" | grep -qE 'failure|cancelled'; then
            exit 1
          fi
